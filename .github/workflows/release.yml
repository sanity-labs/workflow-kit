name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect pending changesets
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ! -d .changeset ]]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' -print -quit 2>/dev/null | grep -q .
          then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: release-gate
    if: needs.release-gate.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm run --if-present test

      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
